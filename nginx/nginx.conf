events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    upstream core_engine {
        server core-engine:8080;
    }

    upstream sdui_gateway {
        server sdui-gateway:8090;
    }

    upstream plugin_host {
        server plugin-host:9091;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            return 200 "ok\n";
        }

        location = /demo {
            return 301 /demo/;
        }

        location /demo/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /demo/index.html;
        }

        location /api/v1/events/ {
            proxy_pass http://core_engine;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/v1/_public/ {
            proxy_pass http://core_engine;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://core_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
            proxy_set_header X-App-Key $http_x_app_key;
            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /uploads/ {
            proxy_pass http://core_engine;
            proxy_set_header Host $host;
        }

        location /ui/ {
            proxy_pass http://sdui_gateway;
            proxy_set_header Host $host;
        }

        location /plugins/ {
            proxy_pass http://plugin_host/;
            proxy_set_header Host $host;
        }
    }
}
