workflow:
  name: match_flow
  entity: ref:entities/Match
  transitions:
    start_match:
      from: [scheduled]
      to: in_progress
      permissions: [user, admin]
      mutation:
        started_at: "event.timestamp"

    complete_match:
      from: [in_progress]
      to: completed
      permissions: [user, admin]
      guard: "len(event.winner_id) > 0"
      guard_message: validation.winnerRequired
      mutation:
        winner_id: "event.winner_id"
        score_a: "event.score_a"
        score_b: "event.score_b"
        completed_at: "event.timestamp"

    cancel_match:
      from: [scheduled, in_progress]
      to: cancelled
      permissions: [admin]
      guard: "len(event.reason) > 0"
      guard_message: validation.reasonRequired
      mutation:
        cancellation_reason: "event.reason"

    assign_referee:
      from: [scheduled]
      to: scheduled
      permissions: [admin]
      guard: "len(event.referee_user_id) > 0"
      guard_message: validation.refereeRequired
      mutation:
        referee_user_id: "event.referee_user_id"
