view:
  name: MyTodoTasks
  layout: Stack
  data_source: ref:queries/my_todo_all
  components:
    - type: DataTable
      props:
        entity: Task
        create_form: MyTodoCreate
        export: true
        import: true
        export_formats: ["csv", "json"]
        columns:
          - field: title
          - field: assignee_user_id
          - field: priority
          - field: due_date
          - field: attachment_url
        row_actions:
          - type: edit
            form: MyTodoEdit
            icon: EditOutlined
            from: [open, in_progress]
          - type: transition
            entity: Task
            transition: start
            icon: PlayCircleOutlined
            from: [open]
          - type: transition
            entity: Task
            transition: complete
            icon: CheckCircleOutlined
            from: [in_progress]
          - type: transition
            entity: Task
            transition: reopen
            icon: RedoOutlined
            from: [done]
          - type: transition
            entity: Task
            transition: assign
            icon: UserAddOutlined
            from: [open, in_progress]
            payload_fields:
              - name: assignee_user_id
                type: AppMemberSelect
                required: true
          - type: transition
            entity: Task
            transition: archive
            icon: InboxOutlined
            icon_only: true
            from: [open, done]
            payload_fields:
              - name: reason
                type: TextInput
                label: fields.archive_reason
                required: true
          - type: delete
            icon: DeleteOutlined
            icon_only: true
            from: [archived]
