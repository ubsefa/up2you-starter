view:
  name: SimpleCrmStats
  layout: Stack
  components:
    - type: Chart
      props:
        title: charts.leads_by_state
        data_source: ref:queries/leads_by_state
        chartType: column
        xField: name
        yField: count
        xLabelKey: states
    - type: Chart
      props:
        title: charts.leads_by_source
        data_source: ref:queries/leads_by_source
        chartType: column
        xField: name
        yField: count
        xLabelKey: fields
