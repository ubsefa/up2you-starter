form:
  name: SimpleCrmEdit
  entity: Lead
  fields:
    - name: name
      type: TextInput
      props:
        required: true
    - name: company
      type: TextInput
    - name: email
      type: TextInput
    - name: phone
      type: TextInput
    - name: source
      type: Select
      props:
        options:
          - value: web
          - value: referral
          - value: event
          - value: cold
          - value: other
    - name: assignee_user_id
      type: AppMemberSelect
    - name: estimated_value
      type: NumberInput
      props:
        min: 0
    - name: notes
      type: TextArea
      props:
        rows: 3
