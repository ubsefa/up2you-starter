services:
  nginx:
    image: nginx:1.27-alpine
    container_name: up2you-starter-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html/demo:ro
    depends_on:
      core-engine:
        condition: service_healthy
      sdui-gateway:
        condition: service_healthy
      plugin-host:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - up2you-starter-net

  core-engine:
    image: ${REGISTRY}/core-engine:${VERSION}
    container_name: up2you-starter-core-engine
    restart: unless-stopped
    volumes:
      - ./tenants:/tenants:ro
      - uploads-data:${UPLOAD_DIR:-/uploads}
    environment:
      - PORT=8080
      - CONFIG_DIR=${CONFIG_DIR}
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=${DB_SSL_MODE}}
      - READ_DATABASE_URL=${READ_DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@read-db:5432/${POSTGRES_DB}?sslmode=${DB_SSL_MODE}}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS}
      - DB_MAX_IDLE_CONNECTIONS=${DB_MAX_IDLE_CONNECTIONS}
      - DB_CONN_MAX_LIFETIME_MINUTES=${DB_CONN_MAX_LIFETIME_MINUTES}
      - NATS_URL=${NATS_URL:-nats://${NATS_USER}:${NATS_PASSWORD}@event-store:4222}
      - JWT_SECRET=${JWT_SECRET}
      - PLATFORM_TENANT_ID=${PLATFORM_TENANT_ID}
      - AUTH_ENABLED=${AUTH_ENABLED}
      - UPLOAD_DIR=${UPLOAD_DIR}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MAX_REQUEST_BODY_BYTES=${MAX_REQUEST_BODY_BYTES}
      - RATE_LIMIT_PER_TENANT=${RATE_LIMIT_PER_TENANT}
      - SSE_MAX_CLIENTS_PER_TENANT=${SSE_MAX_CLIENTS_PER_TENANT}
      - SSE_MAX_CLIENTS_TOTAL=${SSE_MAX_CLIENTS_TOTAL}
    depends_on:
      db:
        condition: service_healthy
      read-db:
        condition: service_healthy
      event-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - up2you-starter-net

  sdui-gateway:
    image: ${REGISTRY}/sdui-gateway:${VERSION}
    container_name: up2you-starter-sdui-gateway
    restart: unless-stopped
    volumes:
      - ./tenants:/tenants:ro
    environment:
      - PORT=8090
      - CORE_ENGINE_URL=http://core-engine:8080
      - CONFIG_DIR=${CONFIG_ROOT}
      - JWT_SECRET=${JWT_SECRET}
      - PLATFORM_TENANT_ID=${PLATFORM_TENANT_ID}
      - AUTH_ENABLED=${AUTH_ENABLED}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      core-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - up2you-starter-net

  plugin-host:
    image: ${REGISTRY}/plugin-host:${VERSION}
    container_name: up2you-starter-plugin-host
    restart: unless-stopped
    volumes:
      - ./tenants:/tenants:ro
    environment:
      - PORT=9091
      - CONFIG_DIR=${CONFIG_ROOT}
      - NATS_URL=${NATS_URL:-nats://${NATS_USER}:${NATS_PASSWORD}@event-store:4222}
      - AUTH_ENABLED=${AUTH_ENABLED}
      - JWT_SECRET=${JWT_SECRET}
      - PLATFORM_TENANT_ID=${PLATFORM_TENANT_ID}
    depends_on:
      event-store:
        condition: service_healthy
      core-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9091/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - up2you-starter-net

  event-store:
    image: ${REGISTRY}/nats:${VERSION}
    container_name: up2you-starter-event-store
    restart: unless-stopped
    volumes:
      - nats-data:/data/jetstream
    environment:
      - NATS_USER=${NATS_USER}
      - NATS_PASSWORD=${NATS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - up2you-starter-net

  db:
    image: ${REGISTRY}/db:${VERSION}
    container_name: up2you-starter-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REPLICATOR_PASSWORD=${REPLICATOR_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    networks:
      - up2you-starter-net

  read-db:
    image: ${REGISTRY}/db-replica:${VERSION}
    container_name: up2you-starter-read-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGPASSWORD=${REPLICATOR_PASSWORD}
      - PRIMARY_HOST=db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - read-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 10
    networks:
      - up2you-starter-net

volumes:
  pg-data:
  read-db-data:
  nats-data:
  uploads-data:

networks:
  up2you-starter-net:
    driver: bridge
